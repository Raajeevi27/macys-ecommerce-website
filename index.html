<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macy's Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Macy's Store</a>
      <div>
        <a class="btn btn-outline-light" href="products.html">Products</a>
        <button class="btn btn-warning" id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="text-center mb-4">Welcome to Macy's Store</h1>
    
    <input type="text" id="searchBar" class="form-control mb-4" placeholder="Search products...">

    <div class="row" id="productList">
      <div class="col-md-4 mb-3">
        <div class="card">
          <img src="img/camera.jpg" class="card-img-top" alt="Camera">
          <div class="card-body">
            <h5 class="card-title">Camera</h5>
            <p class="card-text">$299</p>
            <button class="btn btn-primary addToCart" data-name="Camera" data-price="299">Add to Cart</button>
          </div>
        </div>
      </div>
      
      <div class="col-md-4 mb-3">
        <div class="card">
          <img src="img/watch.jpg" class="card-img-top" alt="Watch">
          <div class="card-body">
            <h5 class="card-title">Watch</h5>
            <p class="card-text">$199</p>
            <button class="btn btn-primary addToCart" data-name="Watch" data-price="199">Add to Cart</button>
          </div>
        </div>
      </div>
      
      <div class="col-md-4 mb-3">
        <div class="card">
          <img src="img/shirt.jpg" class="card-img-top" alt="Shirt">
          <div class="card-body">
            <h5 class="card-title">Shirt</h5>
            <p class="card-text">$49</p>
            <button class="btn btn-primary addToCart" data-name="Shirt" data-price="49">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
